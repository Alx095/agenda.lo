# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: agenda-lo-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build:prod
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: http://localhost:8081,http://localhost:19006,http://127.0.0.1:8081
      - key: DATABASE_URL
        fromDatabase:
          name: agenda-lo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: agenda-lo-db
    plan: free
    databaseName: appointments_db
    user: appointments_user
